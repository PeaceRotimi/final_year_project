repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -  id: trailing-whitespace
    -  id: end-of-file-fixer
    -  id: requirements-txt-fixer
       files: baseline-broker/requirements\.txt # path

-   repo: local
    hooks:
    -  id: pip-freezes
       name: pip-freeze
       entry: bash -c "pip freeze > baseline-broker/requirements.txt"
       language: system
       pass_filenames: false
       always_run: true
       stages: [pre-commit]

